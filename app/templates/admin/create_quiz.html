{% extends "base.html" %}
{% block title %}Create Quiz{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto space-y-8">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight">Новый квиз</h1>
            <p class="text-slate-500 mt-2 text-lg">Создайте структуру вашего теста</p>
        </div>
        <a href="{{ url_for('admin.dashboard') }}" class="text-slate-400 hover:text-slate-600 transition-colors">
            <span class="material-icons text-3xl">cancel</span>
        </a>
    </div>

    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
        <div class="p-8 sm:p-10 space-y-6">
            <div class="space-y-4">
                <div>
                    <label for="quizTitle" class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Название квиза</label>
                    <input type="text" id="quizTitle" 
                        class="w-full px-6 py-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl transition-all outline-none text-lg font-bold text-slate-900 placeholder-slate-300" 
                        placeholder="Например: Основы Python" required>
                </div>
                <div>
                    <label for="quizDescription" class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Описание</label>
                    <textarea id="quizDescription" rows="3"
                        class="w-full px-6 py-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl transition-all outline-none text-slate-600 placeholder-slate-300" 
                        placeholder="О чем этот тест?"></textarea>
                </div>
            </div>

            <div class="pt-8 border-t border-slate-100">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold text-slate-900 flex items-center">
                        <span class="material-icons text-indigo-600 mr-2">quiz</span>
                        Вопросы
                    </h3>
                    <button id="addQuestionBtn" class="inline-flex items-center px-4 py-2 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-bold rounded-xl transition-colors text-sm">
                        <span class="material-icons text-sm mr-1">add</span>
                        Добавить вопрос
                    </button>
                </div>

                <div id="questionsContainer" class="space-y-6">
                    <!-- Вопросы будут здесь -->
                </div>
            </div>

            <div class="pt-10 flex justify-end">
                <button id="saveQuizBtn" class="inline-flex items-center px-10 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl transition-all shadow-xl shadow-indigo-200 hover:-translate-y-1 active:translate-y-0">
                    <span class="material-icons mr-2">save</span>
                    Сохранить квиз
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    window.quizData = {title: '', description: '', questions: []};
</script>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% endblock %}
