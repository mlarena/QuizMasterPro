{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center">
            <div class="mx-auto h-16 w-16 bg-indigo-100 rounded-full flex items-center justify-center mb-4">
                <span class="material-icons text-indigo-600 text-3xl">lock</span>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Вход в систему</h2>
            <p class="mt-2 text-sm text-gray-500">Добро пожаловать в QuizMasterPro</p>
        </div>
        <form class="mt-8 space-y-6" action="{{ url_for('auth.login') }}" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Имя пользователя</label>
                    <input id="username" name="username" type="text" required 
                        class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm transition" 
                        placeholder="Введите ваш логин">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                    <input id="password" name="password" type="password" required 
                        class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm transition" 
                        placeholder="Введите пароль">
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all shadow-lg shadow-indigo-500/25 active:scale-[0.98]">
                    Войти
                </button>
            </div>
            
            <div class="text-center mt-6">
                <p class="text-sm text-gray-600">
                    Нет аккаунта? 
                    <a href="{{ url_for('auth.register') }}" class="font-bold text-indigo-600 hover:text-indigo-500 transition">Зарегистрироваться</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
