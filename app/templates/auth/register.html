{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center">
            <div class="mx-auto h-16 w-16 bg-indigo-100 rounded-full flex items-center justify-center mb-4">
                <span class="material-icons text-indigo-600 text-3xl">person_add</span>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Регистрация</h2>
            <p class="mt-2 text-sm text-gray-500">Создайте новый аккаунт</p>
        </div>
        <form class="mt-8 space-y-6" action="{{ url_for('auth.register') }}" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Имя пользователя</label>
                    <input id="username" name="username" type="text" required 
                        class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm transition" 
                        placeholder="Придумайте логин">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                    <input id="password" name="password" type="password" required 
                        class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm transition" 
                        placeholder="Придумайте пароль">
                </div>
                <div class="flex items-center p-3 bg-gray-50 rounded-xl border border-gray-200">
                    <input id="is_admin" name="is_admin" type="checkbox" 
                        class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded transition">
                    <label for="is_admin" class="ml-3 block text-sm text-gray-700 font-medium">
                        Зарегистрироваться как администратор
                    </label>
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition shadow-lg hover:shadow-indigo-200">
                    Создать аккаунт
                </button>
            </div>
            
            <div class="text-center mt-6">
                <p class="text-sm text-gray-600">
                    Уже есть аккаунт? 
                    <a href="{{ url_for('auth.login') }}" class="font-bold text-indigo-600 hover:text-indigo-500 transition">Войти</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
