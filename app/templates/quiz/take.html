{% extends "base.html" %}
{% block title %}Take Quiz: {{ quiz.title }}{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto space-y-8">
    <div class="text-center space-y-4">
        <h1 class="text-4xl font-black text-slate-900 tracking-tight">{{ quiz.title }}</h1>
        <p class="text-slate-500 text-lg">{{ quiz.description or 'Приготовьтесь, тест начинается!' }}</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
        <!-- Progress Bar -->
        <div class="bg-slate-50 px-8 py-4 border-b border-slate-100">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Прогресс</span>
                <span id="progressText" class="text-xs font-bold text-indigo-600 uppercase tracking-widest">0%</span>
            </div>
            <div class="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-indigo-600 transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="p-8 sm:p-12">
            <div id="quizContainer" class="min-h-[300px]">
                <!-- Вопросы будут вставлены сюда через JS -->
                <div class="flex items-center justify-center h-full py-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                </div>
            </div>

            <div class="flex items-center justify-between mt-12 pt-8 border-t border-slate-100">
                <button id="prevQuestionBtn" class="inline-flex items-center px-6 py-3 text-slate-400 hover:text-indigo-600 font-bold transition-colors disabled:opacity-0 active:scale-95">
                    <span class="material-icons mr-2">arrow_back</span>
                    Назад
                </button>
                
                <div class="flex space-x-4">
                    <button id="nextQuestionBtn" class="inline-flex items-center px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-indigo-200 hover:-translate-y-0.5 active:scale-95">
                        Далее
                        <span class="material-icons ml-2">arrow_forward</span>
                    </button>
                    
                    <button id="submitQuizBtn" class="hidden inline-flex items-center px-8 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-emerald-200 hover:-translate-y-0.5 active:scale-95">
                        Завершить
                        <span class="material-icons ml-2">check_circle</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    window.quizConfig = {
        id: parseInt("{{ quiz.id }}"),
        questions: {{ questions | tojson | safe }}
    };
</script>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
{% endblock %}
